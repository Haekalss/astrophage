<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Astrophage</title>
<style>
  body { margin:0; overflow:hidden; background:black; touch-action:none; }

  #webcam {
    position: fixed;
    left: 14px;
    bottom: 14px;
    width: 170px;
    height: 96px;
    object-fit: cover;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    opacity: 0.9;
    z-index: 20;
    pointer-events: none;
    transform: scaleX(-1);
  }
</style>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { EffectComposer } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/EffectComposer.js";
import { RenderPass } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/RenderPass.js";
import { UnrealBloomPass } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/UnrealBloomPass.js";
import { OutputPass } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/postprocessing/OutputPass.js";

const scene = new THREE.Scene();

// CAMERA
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.z = 5;

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// postprocessing for soft scene-integrated glow
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  0.42,
  0.65,
  0.78
);
composer.addPass(bloomPass);

const outputPass = new OutputPass();
composer.addPass(outputPass);

// =====================
// 🌍 PLANET
// =====================
const planet = new THREE.Mesh(
  new THREE.SphereGeometry(2,96,96),
  new THREE.ShaderMaterial({
    uniforms:{
      time:{value:0},
      darkness:{value:0}
    },
    vertexShader:`
      varying vec3 vPos;
      varying vec3 vNormalW;

      void main(){
        vPos = position;
        vNormalW = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
      }
    `,
    fragmentShader:`
      varying vec3 vPos;
      varying vec3 vNormalW;
      uniform float time;
      uniform float darkness;

      float hash(vec2 p){
        return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
      }

      float noise(vec2 p){
        vec2 i = floor(p);
        vec2 f = fract(p);
        vec2 u = f * f * (3.0 - 2.0 * f);

        float a = hash(i);
        float b = hash(i + vec2(1.0, 0.0));
        float c = hash(i + vec2(0.0, 1.0));
        float d = hash(i + vec2(1.0, 1.0));

        return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
      }

      float fbm(vec2 p){
        float f = 0.0;
        f += 0.5 * noise(p); p = p * 2.1 + vec2(1.3, 2.1);
        f += 0.25 * noise(p); p = p * 2.0 + vec2(3.7, 1.9);
        f += 0.125 * noise(p);
        return f / 0.875;
      }

      float triplanarFbm(vec3 p, vec3 n, float scale, vec2 offset){
        vec3 w = abs(n);
        w = pow(w, vec3(4.0));
        w /= max(dot(w, vec3(1.0)), 0.0001);

        float x = fbm(p.yz * scale + offset);
        float y = fbm(p.xz * scale + offset * 1.13 + vec2(3.1, -2.7));
        float z = fbm(p.xy * scale + offset * 0.87 + vec2(-1.9, 4.2));

        return x * w.x + y * w.y + z * w.z;
      }

      float triplanarRidge(vec3 p, vec3 n, float scale, vec2 offset){
        vec3 w = abs(n);
        w = pow(w, vec3(4.0));
        w /= max(dot(w, vec3(1.0)), 0.0001);

        float x = 1.0 - abs(noise(p.yz * scale + offset) * 2.0 - 1.0);
        float y = 1.0 - abs(noise(p.xz * scale + offset * 1.13 + vec2(3.1, -2.7)) * 2.0 - 1.0);
        float z = 1.0 - abs(noise(p.xy * scale + offset * 0.87 + vec2(-1.9, 4.2)) * 2.0 - 1.0);

        return x * w.x + y * w.y + z * w.z;
      }

      void main(){
        float yNorm = clamp(vPos.y / 2.0, -1.0, 1.0);
        vec3 nPos = normalize(vPos);
        vec3 texN = normalize(vNormalW);

        float warpX = triplanarFbm(nPos + vec3(0.0, 2.1, -1.3), texN, 8.0, vec2(1.7, -0.8));
        float warpY = triplanarFbm(nPos + vec3(-1.9, 0.0, 2.4), texN, 8.6, vec2(-2.3, 0.5));
        float warpZ = triplanarFbm(nPos + vec3(2.6, -1.1, 0.0), texN, 7.4, vec2(0.9, 2.2));
        vec3 warpedPos = nPos + (vec3(warpX, warpY, warpZ) - 0.5) * 0.2;

        float detailA = triplanarFbm(warpedPos, texN, 7.2, vec2(time * 0.006, -time * 0.004));
        float detailB = triplanarFbm(warpedPos, texN, 19.4, vec2(-time * 0.01, time * 0.007));
        float macro = smoothstep(0.24, 0.84, detailA * 0.68 + detailB * 0.32);

        float strataBase = triplanarFbm(warpedPos + vec3(0.0, time * 0.02, 0.0), texN, 15.0, vec2(0.0, time * 0.01));
        float strata = sin((strataBase * 8.5 + warpedPos.y * 5.0 + time * 0.05) * 3.14159265) * 0.5 + 0.5;
        float strataMask = smoothstep(0.54, 0.95, strata * 0.6 + detailA * 0.4);

        float pitsBase = triplanarFbm(warpedPos, texN, 45.0, vec2(5.1, -1.7));
        float pitMask = smoothstep(0.68, 0.9, pitsBase) * (0.55 + (1.0 - macro) * 0.45);

        float crackNoise = triplanarRidge(warpedPos, texN, 68.0, vec2(time * 0.03, -time * 0.02));
        float crackMask = smoothstep(0.86, 0.985, crackNoise) * (0.35 + detailB * 0.65);

        vec3 rockDark = vec3(0.07, 0.15, 0.09);
        vec3 rockMid = vec3(0.2, 0.44, 0.19);
        vec3 rockWarm = vec3(0.66, 0.38, 0.14);
        vec3 acidPond = vec3(0.12, 0.62, 0.38);

        vec3 col = mix(rockDark, rockMid, macro);
        col = mix(col, rockWarm, strataMask * 0.58);
        col = mix(col, acidPond, pitMask * 0.42);
        col += vec3(1.0, 0.34, 0.09) * crackMask * 0.24;

        float haze = smoothstep(0.64, 0.9, triplanarFbm(warpedPos, texN, 40.0, vec2(time * 0.012, -time * 0.01)));
        col = mix(col, vec3(0.82, 0.9, 0.78), haze * 0.2);

        float bottomMask = 1.0 - smoothstep(-1.0, -0.08, yNorm);
        col *= 1.0 - bottomMask * 0.45;

        vec3 lightDir = normalize(vec3(0.8, 0.6, 0.45));
        vec3 normal = normalize(vNormalW);
        float ndl = dot(normal, lightDir);
        float diffuse = max(ndl, 0.0);
        float terminator = smoothstep(-0.2, 0.28, ndl);

        vec3 litCol = col * (0.2 + diffuse * 0.95);
        vec3 nightCol = col * 0.07;
        col = mix(nightCol, litCol, terminator);

        vec3 viewDir = normalize(vec3(0.0, 0.0, 1.0));
        float viewTerm = max(dot(normal, viewDir), 0.0);
        float limb = pow(1.0 - viewTerm, 1.9);
        col *= 1.0 - limb * 0.09;

        vec3 halfDir = normalize(lightDir + viewDir);
        float spec = pow(max(dot(normal, halfDir), 0.0), 24.0);
        float wetMask = smoothstep(0.52, 0.9, pitMask + detailB * 0.35);
        col += vec3(0.16, 0.2, 0.1) * spec * terminator * (0.42 + wetMask * 0.82);

        float softAura = pow(1.0 - viewTerm, 2.35) * (0.56 + diffuse * 0.24);
        float auraPulse = 0.9 + 0.1 * sin(time * 0.8 + detailA * 6.0);
        col += vec3(0.2, 0.32, 0.22) * softAura * auraPulse * 0.34;

        float redGlowAmt = smoothstep(0.02, 0.55, darkness);
        float rim = pow(1.0 - max(dot(normal, viewDir), 0.0), 2.2);
        float corePulse = 0.55 + 0.45 * sin(time * 1.2 + detailB * 8.0);
        vec3 redGlowCol = vec3(1.0, 0.2, 0.16);
        col += redGlowCol * redGlowAmt * (0.16 + rim * 0.65 + corePulse * 0.26);

        col *= mix(1.0, 0.95, darkness * 0.12);

        gl_FragColor = vec4(col, 1.0);
      }
    `
  })
);
planet.position.y = -1.6;
scene.add(planet);

// LIGHT
const light = new THREE.PointLight(0xffffff,2);
light.position.set(5,5,5);
scene.add(light);

// =====================
// ⭐ STAR SYSTEM (STABLE)
// =====================
function createStars(count, spread, sizeMin, sizeMax){
  const geo = new THREE.BufferGeometry();
  const pos=[], size=[], rand=[];

  for(let i=0;i<count;i++){
    pos.push(
      (Math.random()-0.5)*spread,
      (Math.random()-0.5)*spread,
      (Math.random()-0.5)*spread
    );

    const sizeMix = Math.pow(Math.random(), 1.9);
    size.push(sizeMix*(sizeMax-sizeMin)+sizeMin);
    rand.push(Math.random());
  }

  geo.setAttribute("position", new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute("aSize", new THREE.Float32BufferAttribute(size,1));
  geo.setAttribute("aRandom", new THREE.Float32BufferAttribute(rand,1));

  const mat = new THREE.ShaderMaterial({
    transparent:true,
    blending:THREE.AdditiveBlending,
    depthWrite:false,
    uniforms:{
      time:{value:0},
      opacity:{value:0}
    },
    vertexShader:`
      attribute float aSize;
      attribute float aRandom;
      varying float vRandom;
      varying float vDepth;

      void main(){
        vRandom = aRandom;
        vec4 mvPosition = modelViewMatrix * vec4(position,1.0);
        float depthScale = clamp(180.0 / max(1.0, -mvPosition.z), 0.75, 5.0);
        vDepth = clamp(-mvPosition.z / 260.0, 0.0, 1.0);
        gl_PointSize = aSize * depthScale;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader:`
      varying float vRandom;
      varying float vDepth;
      uniform float time;
      uniform float opacity;

      void main(){
        float d = length(gl_PointCoord - vec2(0.5));
        float circle = smoothstep(0.5,0.1,d);

        float blink = sin(time*(1.5+vRandom*3.0)+vRandom*20.0)*0.5+0.5;

        vec3 col = mix(vec3(0.85,0.1,0.1),vec3(1.0,0.35,0.35),vRandom);

        float depthGlow = mix(1.2, 0.75, vDepth);

        gl_FragColor = vec4(col, circle * blink * depthGlow * opacity);
      }
    `
  });

  return new THREE.Points(geo, mat);
}

// ⭐ LAYERS
const starLayers = [
  { points: createStars(1500, 260, 0.8, 1.7), parallax: 0.04, spinY: 0.00012, spinX: 0.00005 },
  { points: createStars(1200, 90, 1.6, 3.5), parallax: 0.09, spinY: 0.00018, spinX: -0.00008 },
  { points: createStars(1400, 55, 2.3, 4.8), parallax: 0.16, spinY: 0.00026, spinX: 0.0001 },
  { points: createStars(900, 32, 3.0, 6.8), parallax: 0.28, spinY: 0.00036, spinX: -0.00014, z: 2.6 },
  { points: createStars(520, 20, 4.0, 9.4), parallax: 0.44, spinY: 0.00048, spinX: 0.00018, z: 4.2 },
  { points: createStars(280, 10, 5.4, 12.5), parallax: 0.62, spinY: 0.00062, spinX: -0.0002, z: 5.4 }
];

starLayers.forEach((layer)=>{
  if(layer.z !== undefined){
    layer.points.position.z = layer.z;
  }
  scene.add(layer.points);
});

// =====================
// 🎥 CAMERA DETECTION (IMPROVED)
// =====================
const video = document.getElementById("webcam");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(err => console.log(err));

const canvas = document.createElement("canvas");
const ctx = canvas.getContext("2d");

let brightness = 1;
let smoothBrightness = 1;
let darknessLevel = 0;

let targetMouseX = 0;
let targetMouseY = 0;
let mouseX = 0;
let mouseY = 0;

let isPointerDown = false;
let lastPointerX = 0;
let lastPointerY = 0;

function updatePointer(clientX, clientY){
  targetMouseX = (clientX / innerWidth) * 2 - 1;
  targetMouseY = (clientY / innerHeight) * 2 - 1;
}

function clamp(v, min, max){
  return Math.min(max, Math.max(min, v));
}

renderer.domElement.addEventListener("pointerdown", (e) => {
  isPointerDown = true;
  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  renderer.domElement.setPointerCapture(e.pointerId);
});

renderer.domElement.addEventListener("pointermove", (e) => {
  if(e.pointerType === "mouse" && !isPointerDown){
    updatePointer(e.clientX, e.clientY);
    return;
  }

  if(!isPointerDown) return;

  const dx = e.clientX - lastPointerX;
  const dy = e.clientY - lastPointerY;

  targetMouseX = clamp(targetMouseX + (dx / innerWidth) * 2.4, -1, 1);
  targetMouseY = clamp(targetMouseY + (dy / innerHeight) * 2.4, -1, 1);

  lastPointerX = e.clientX;
  lastPointerY = e.clientY;
  e.preventDefault();
}, { passive:false });

function endPointer(){
  isPointerDown = false;
  targetMouseX = 0;
  targetMouseY = 0;
}

renderer.domElement.addEventListener("pointerup", endPointer);
renderer.domElement.addEventListener("pointercancel", endPointer);

function getBrightness(){
  if(video.readyState !== video.HAVE_ENOUGH_DATA) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video,0,0);

  const frame = ctx.getImageData(0,0,canvas.width,canvas.height);
  let total = 0;

  for(let i=0;i<frame.data.length;i+=4){
    total += (frame.data[i]+frame.data[i+1]+frame.data[i+2])/3;
  }

  brightness = total / (frame.data.length/4) / 255;
  smoothBrightness += (brightness - smoothBrightness) * 0.03;
}

// =====================
// 🎬 ANIMATION
// =====================
let starVisibility = 0;

const DARK_START = 0.18;
const DARK_FULL  = 0.08;

function animate(t){
  requestAnimationFrame(animate);

  getBrightness();

  mouseX += (targetMouseX - mouseX) * 0.075;
  mouseY += (targetMouseY - mouseY) * 0.075;
  const rotateMouseY = Math.min(mouseY, 0);

  // 🔥 smooth mapping
  if(smoothBrightness > DARK_START){
    darknessLevel += (0 - darknessLevel) * 0.05;
  }
  else if(smoothBrightness < DARK_FULL){
    darknessLevel += (1 - darknessLevel) * 0.05;
  }
  else{
    let range = (DARK_START - smoothBrightness) / (DARK_START - DARK_FULL);
    darknessLevel += (range - darknessLevel) * 0.05;
  }

  // ⭐ stars
  starVisibility += (darknessLevel - starVisibility) * 0.05;

  starLayers.forEach((layer)=>{
    const s = layer.points;
    const targetX = mouseX * layer.parallax;
    const targetY = -rotateMouseY * layer.parallax;

    s.material.uniforms.opacity.value = starVisibility;
    s.material.uniforms.time.value = t * 0.001;

    s.position.x += (targetX - s.position.x) * 0.048;
    s.position.y += (targetY - s.position.y) * 0.048;

    s.rotation.y += layer.spinY + mouseX * 0.00035;
    s.rotation.x += layer.spinX + rotateMouseY * 0.00018;
  });

  planet.material.uniforms.time.value = t * 0.001;
  planet.material.uniforms.darkness.value = starVisibility;

  planet.rotation.x += ((-rotateMouseY * 0.2) - planet.rotation.x) * 0.05;
  planet.rotation.z += ((mouseX * 0.08) - planet.rotation.z) * 0.05;
  planet.rotation.y += 0.0013 + mouseX * 0.0022;

  camera.position.x += (mouseX * 0.7 - camera.position.x) * 0.04;
  camera.position.y += (-rotateMouseY * 0.45 - camera.position.y) * 0.04;
  camera.lookAt(0, -0.35, 0);

  composer.render();
}
animate();

// resize
window.addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloomPass.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
